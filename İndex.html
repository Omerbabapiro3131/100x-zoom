<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100x Zoom Kamera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
            width: 90%;
            max-width: 500px;
        }
        .controls span {
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }
        input[type="range"] {
            flex: 1;
            accent-color: #00ff88;
            cursor: pointer;
        }
        .zoom-text {
            font-size: 1.2rem;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        .error-msg {
            color: #ff4444;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="cameraView" autoplay playsinline></video>
        
        <div class="controls">
            <span>1x</span>
            <input type="range" id="zoomSlider" min="1" max="100" value="1" step="0.1">
            <span class="zoom-text" id="zoomValue">1.0x</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('cameraView');
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');

        // Kamerayı başlat
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment", // Varsa arka kamerayı tercih et
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                document.body.innerHTML = `<div class="error-msg">
                    <h2>Kamera Erişilemedi</h2>
                    <p>Lütfen kamera izinlerini kontrol edin veya HTTPS bağlantısı kullandığınızdan emin olun.</p>
                    <p style="font-size:0.8rem; margin-top:10px;">Hata: ${err.message}</p>
                </div>`;
            }
        }

        // Slider değiştikçe CSS Transform (CSS Zoom) uygula
        zoomSlider.addEventListener('input', (e) => {
            const zoomLevel = e.target.value;
            
            // Dijital zoom efekti için video elementini büyütüyoruz
            video.style.transform = `scale(${zoomLevel})`;
            
            // Ekranda zoom miktarını göster (Örn: 45.5x)
            zoomValue.textContent = parseFloat(zoomLevel).toFixed(1) + 'x';
        });

        // Sayfa yüklendiğinde kamerayı aç
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>

</body>
</html>
